name: Update Contributors

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly on Sunday at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to access commit details

      - name: Get Contributors and Commit Counts
        id: contributors
        run: |
          set -euo pipefail
          # Fetch contributors and commit counts
          echo "{}" > contributors.json
          git checkout dev
          contributors=$(git log --pretty=format:%an | sort | uniq -c)
          echo "$contributors" | while read -r count author_name; do
            if [ -z "$author_name" ]; then continue; fi
            login=$(echo "$author_name" | tr -s ' ' '-' | tr -dc '[:alnum:]-')
            jq --arg login "$login" --arg count "$count" \
               '.[$login] |= (. // {commits: 0, login: $login} | .commits = ($count | tonumber))' \
               contributors.json > tmp.json && mv tmp.json contributors.json
          done
          # Generate list sorted by commit count
          list=$(jq -r 'to_entries | sort_by(.value.commits) | reverse | .[] | select(.value.commits > 0) | "- [\(.key)](https://github.com/\(.key))"' contributors.json)
          if [ -z "$list" ]; then list="No contributors with commits."; fi
          echo "$list" > contributors_list.txt
        shell: bash

      - name: Update README
        run: |
          set -euo pipefail
          if [ ! -s contributors_list.txt ] || [ "$(cat contributors_list.txt)" = "No contributors with commits." ]; then
            echo "No contributors to update."
            exit 0
          fi
          # Replace content between markers
          awk '/<!-- START_CONTRIBUTORS -->/{print; while(getline < "contributors_list.txt") print; flag=1; next} /<!-- END_CONTRIBUTORS -->/{flag=0} !flag' README.md > temp_readme.md
          mv temp_readme.md README.md
          # Commit changes
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update contributors list"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
